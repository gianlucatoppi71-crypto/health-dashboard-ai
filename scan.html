<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Food Scanner</title>

    <link rel="stylesheet" href="scan.css">

    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #4CAF50;
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding-bottom: 100px;
        }

        video, img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:active {
            background: #3e8e41;
        }

        .hidden {
            display: none;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #loading {
            text-align: center;
            font-size: 20px;
            padding: 10px;
            color: #333;
        }

        /* Bottom Menu */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #ccc;
        }

        .bottom-menu a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>AI Food Scanner</h1>

    <div class="container">

        <!-- CAMERA -->
        <video id="camera" autoplay playsinline></video>

        <button id="startCamera">Start Camera</button>
        <button id="capture">Scan Food</button>

        <input type="file" id="upload" accept="image/*">

        <div id="loading" class="hidden">⏳ Analyzing...</div>

        <!-- RESULT IMAGE -->
        <img id="resultImage" class="hidden" />

        <!-- NUTRITION CARD -->
        <div id="nutritionCard" class="card hidden">
            <h2>Nutrition</h2>
            <div id="nutritionContent"></div>
        </div>

        <!-- VERDICT CARD -->
        <div id="verdictCard" class="card hidden">
            <h2>Health Verdict</h2>
            <div id="verdictContent"></div>
        </div>

        <!-- ALTERNATIVE CARD -->
        <div id="alternativeCard" class="card hidden">
            <h2>Better Alternative</h2>
            <div id="alternativeContent"></div>
        </div>

        <!-- TRACKING CARD -->
        <div id="trackingCard" class="card hidden">
            <h2>Weekly Tracking</h2>
            <div id="trackingContent"></div>
        </div>

        <!-- DOCTOR SUMMARY -->
        <div id="doctorCard" class="card hidden">
            <h2>AI Doctor Summary</h2>
            <div id="doctorText"></div>
        </div>

    </div>

    <!-- BOTTOM MENU -->
    <div class="bottom-menu">
        <a href="index.html">🏠 Home</a>
        <a href="scan.html">📷 Scan</a>
        <a href="health.html">❤️ Health</a>
    </div>

    <script src="scan.js"></script>

</body>
</html>
