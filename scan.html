<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Food Scanner</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- TensorFlow.js MUST LOAD BEFORE scan.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

  <!-- QuaggaJS (FREE barcode scanner) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="scan.css" />
</head>

<body class="bg-gray-100 pb-24">

  <header class="p-4 bg-white shadow-md">
    <h1 class="text-2xl font-bold text-blue-600">AI Food Scanner</h1>
    <p class="text-gray-600 text-sm">Scan food or barcode for full nutrition & health verdict</p>
  </header>

  <section class="p-4">
    <div class="bg-black rounded-xl overflow-hidden shadow-md">
      <video id="cameraFeed" autoplay playsinline class="w-full h-72 object-cover"></video>
    </div>

    <div class="flex justify-center mt-4 space-x-4">
      <button id="captureBtn"
        class="bg-blue-600 text-white px-6 py-3 rounded-full font-semibold shadow-md">
        Capture
      </button>

      <button id="barcodeBtn"
        class="bg-green-600 text-white px-6 py-3 rounded-full font-semibold shadow-md">
        Barcode
      </button>
    </div>

    <p id="loadingBox" class="text-center text-gray-700 mt-3 hidden"></p>
  </section>

  <section id="resultSection" class="p-4 hidden">
    <h2 class="text-xl font-bold text-gray-800 mb-2">Scan Result</h2>

    <div class="bg-white p-4 rounded-xl shadow-md mb-4">
      <h3 class="text-lg font-semibold text-blue-600" id="foodName">Food Name</h3>
      <p class="text-gray-600 text-sm" id="foodConfidence"></p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-md mb-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-2">Nutrition</h3>
      <div id="nutritionCard" class="text-gray-700 text-sm space-y-1"></div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-md mb-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-2">Health Verdict</h3>
      <p id="verdictText" class="text-gray-700"></p>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-md mb-4">
      <h3 class="text-lg font-semibold text-gray-800 mb-2">Better Alternative</h3>
      <p id="alternativeText" class="text-gray-700"></p>
    </div>

    <button id="scanAgainBtn"
      class="bg-gray-800 text-white px-6 py-3 rounded-full font-semibold shadow-md w-full hidden">
      Scan Again
    </button>
  </section>

  <nav class="bottom-nav fixed bottom-0 left-0 w-full bg-white shadow-lg flex justify-around items-center py-3">
    <button onclick="window.location.href='index.html'">Meals</button>
    <button onclick="window.location.href='health.html'">Health</button>
    <a href="scan.html"><button class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-md">Scan</button></a>
    <button onclick="window.location.href='plants.html'">Plants</button>
    <button onclick="window.location.href='profile.html'">Profile</button>
  </nav>

  <!-- Your script MUST be last -->
  <script src="scan.js"></script>

</body>
</html>
