<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Food Scanner</title>
    <link rel="stylesheet" href="scan.css">
</head>

<body>

    <header class="header">
        <h1>AI Food Scanner</h1>
        <p class="subtitle">Instant nutrition, health impact & smart suggestions</p>
    </header>

    <main class="container">

        <!-- CAMERA + UPLOAD SECTION -->
        <section class="scan-box">
            <video id="camera" autoplay playsinline muted></video>

            <div class="buttons">
                <button id="startCamera">📷 Start Camera</button>
                <button id="capture">📸 Capture</button>
                <input type="file" id="upload" accept="image/*">
            </div>

            <div id="loading" class="loading hidden">Analyzing…</div>

            <img id="resultImage" class="hidden" />
        </section>

        <!-- NUTRITION CARD -->
        <section id="nutritionCard" class="card hidden">
            <h2>Nutrition Facts</h2>
            <div id="nutritionContent"></div>
        </section>

        <!-- HEALTH VERDICTS -->
        <section id="verdictCard" class="card hidden">
            <h2>Health Verdict</h2>
            <div id="verdictContent"></div>
        </section>

        <!-- ALTERNATIVES -->
        <section id="alternativeCard" class="card hidden">
            <h2>Better Alternative</h2>
            <div id="alternativeContent"></div>
        </section>

        <!-- WEEKLY TRACKING -->
        <section id="trackingCard" class="card hidden">
            <h2>Weekly Tracking</h2>
            <div id="trackingContent"></div>
        </section>

        <!-- AI DOCTOR SUMMARY -->
        <section id="doctorCard" class="card hidden">
            <h2>AI Doctor Summary</h2>
            <p id="doctorText"></p>
        </section>

    </main>

    <script src="scan.js"></script>
</body>
</html>
